# Render Blueprint deploys PhishGuard as a free web service.
# Render reads this automatically when you create a Blueprint from the repo.
services:
  - type: web
    name: phishguard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"

# Storage note:
# With no DATABASE_URL set, the app uses a local SQLite file. On Render's
# free tier the filesystem is ephemeral, so scan history resets whenever the
# service restarts. That is fine for a demo.
#
# For persistent history, create a Render PostgreSQL instance, uncomment
# psycopg2-binary in requirements.txt, and add its connection string as a
# DATABASE_URL environment variable. No code change is needed — database.py
# already reads DATABASE_URL and rewrites the postgres:// prefix.
