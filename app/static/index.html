<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PhishGuard — URL risk analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#E5EAED;
    --surface:#F8FAFB;
    --ink:#12171C;
    --muted:#5C6873;
    --rule:#C4CFD6;
    --plate:#1F3A5F;          /* interactive only — never a verdict colour */
    --safe:#16694A;
    --suspicious:#96590A;
    --danger:#9E2420;
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Archivo',system-ui,-apple-system,sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:860px;margin:0 auto;padding:32px 20px 72px}

  /* ---- masthead ---- */
  .masthead{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:16px;flex-wrap:wrap;
    border-bottom:2px solid var(--ink);padding-bottom:10px;
  }
  .wordmark{
    font-size:26px;font-weight:700;letter-spacing:-.03em;margin:0;
  }
  .wordmark span{color:var(--plate)}
  .tagline{
    font-family:var(--mono);font-size:11.5px;color:var(--muted);
    letter-spacing:.02em;
  }

  .eyebrow{
    font-size:10.5px;font-weight:600;text-transform:uppercase;
    letter-spacing:.16em;color:var(--muted);
    display:block;margin-bottom:10px;
  }

  /* ---- input ---- */
  .console{margin-top:26px}
  .field{display:flex;gap:8px;flex-wrap:wrap}
  .field input{
    flex:1 1 320px;min-width:0;
    font-family:var(--mono);font-size:14px;
    padding:13px 14px;color:var(--ink);
    background:var(--surface);
    border:1px solid var(--rule);border-radius:2px;
  }
  .field input::placeholder{color:#9AA6B0}
  .field input:focus-visible,
  button:focus-visible,
  .sample:focus-visible{
    outline:2px solid var(--plate);outline-offset:2px;
  }
  .field button{
    font-family:var(--sans);font-size:13px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;
    padding:13px 26px;color:#fff;background:var(--plate);
    border:none;border-radius:2px;cursor:pointer;
  }
  .field button:hover{background:#2B4C77}
  .field button:disabled{opacity:.55;cursor:not-allowed}

  .samples{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .samples-label{
    font-family:var(--mono);font-size:11px;color:var(--muted);margin-right:2px;
  }
  .sample{
    font-family:var(--mono);font-size:11px;
    padding:4px 9px;background:transparent;color:var(--plate);
    border:1px dashed var(--rule);border-radius:2px;cursor:pointer;
  }
  .sample:hover{border-style:solid;background:var(--surface)}

  .msg{
    margin-top:14px;font-family:var(--mono);font-size:12.5px;
    color:var(--danger);
  }

  /* ---- result card ---- */
  .card{
    background:var(--surface);border:1px solid var(--rule);border-radius:2px;
    padding:22px;margin-top:26px;
  }
  .card[hidden]{display:none}

  /* signature: the specimen dissection */
  .specimen{
    font-family:var(--mono);font-size:16px;line-height:1.9;
    word-break:break-all;margin:0 0 4px;
  }
  .seg{padding:2px 1px;border-bottom:2px solid transparent}
  .seg-scheme{border-bottom-color:#9AA6B0}
  .seg-host{border-bottom-color:var(--plate);font-weight:700}
  .seg-path{border-bottom-color:#B7C2CA}
  .legend{
    display:flex;gap:18px;flex-wrap:wrap;
    font-family:var(--mono);font-size:10.5px;color:var(--muted);
    padding-bottom:18px;border-bottom:1px solid var(--rule);
  }
  .legend i{font-style:normal;border-bottom:2px solid;padding-bottom:1px}
  .lg-scheme{border-color:#9AA6B0}
  .lg-host{border-color:var(--plate)}
  .lg-path{border-color:#B7C2CA}

  /* verdict */
  .verdict-row{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:14px;flex-wrap:wrap;margin-top:18px;
  }
  .verdict{
    font-size:30px;font-weight:700;letter-spacing:-.02em;margin:0;line-height:1;
  }
  .score{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .score b{font-size:20px;color:var(--ink);font-weight:700}
  .v-safe{color:var(--safe)}
  .v-suspicious{color:var(--suspicious)}
  .v-dangerous{color:var(--danger)}

  /* ledger: score assembled from weights */
  .ledger{
    display:flex;height:12px;margin-top:12px;gap:2px;
    background:repeating-linear-gradient(90deg,var(--rule) 0 1px,transparent 1px 6px);
    border:1px solid var(--rule);
  }
  .ledger div{
    height:100%;transition:width .5s ease;
  }
  .ledger-scale{
    display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;
  }

  /* signals */
  .signals{margin-top:24px}
  .sig{
    display:grid;grid-template-columns:44px 1fr;gap:12px;
    padding:10px 0;border-top:1px solid var(--rule);align-items:start;
  }
  .sig-pts{
    font-family:var(--mono);font-size:13px;font-weight:700;text-align:right;
  }
  .sig-name{font-weight:600;font-size:14px}
  .sig-why{font-size:13px;color:var(--muted)}
  .clean{
    font-family:var(--mono);font-size:13px;color:var(--safe);
    padding:10px 0;border-top:1px solid var(--rule);
  }

  /* ---- history ---- */
  .history{margin-top:40px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{
    font-size:10.5px;font-weight:600;text-transform:uppercase;
    letter-spacing:.12em;color:var(--muted);text-align:left;
    padding:0 8px 8px 0;border-bottom:1px solid var(--ink);
  }
  td{padding:9px 8px 9px 0;border-bottom:1px solid var(--rule);vertical-align:top}
  td.u{font-family:var(--mono);font-size:12px;word-break:break-all;max-width:380px}
  td.s{font-family:var(--mono);font-weight:700;white-space:nowrap}
  td.t{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap}
  .empty{
    font-family:var(--mono);font-size:12.5px;color:var(--muted);
    padding:14px 0;
  }

  footer{
    margin-top:44px;padding-top:14px;border-top:1px solid var(--rule);
    font-family:var(--mono);font-size:11px;color:var(--muted);
    display:flex;gap:16px;flex-wrap:wrap;
  }
  footer a{color:var(--plate)}

  @media (prefers-reduced-motion:reduce){
    .ledger div{transition:none}
  }
  @media (max-width:560px){
    .verdict{font-size:24px}
    .specimen{font-size:14px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <h1 class="wordmark">Phish<span>Guard</span></h1>
    <div class="tagline">heuristic URL analysis · <span id="ruleCount">…</span> rules</div>
  </header>

  <section class="console">
    <label class="eyebrow" for="url">Check a link</label>
    <div class="field">
      <input id="url" type="text" placeholder="https://example.com/login"
             autocomplete="off" spellcheck="false">
      <button id="go">Scan</button>
    </div>
    <div class="samples">
      <span class="samples-label">try:</span>
      <button class="sample" data-url="https://www.google.com">a safe link</button>
      <button class="sample" data-url="http://paypal-verify.secure-update.xyz@192.168.0.10/login-confirm-account">a phishing link</button>
      <button class="sample" data-url="http://mtn-mobilemoney.account-verify.top/wallet/update.apk">a mobile-money lure</button>
    </div>
    <div class="msg" id="msg"></div>
  </section>

  <section class="card" id="result" hidden>
    <span class="eyebrow">Specimen</span>
    <p class="specimen" id="specimen"></p>
    <div class="legend">
      <span><i class="lg-scheme">scheme</i></span>
      <span><i class="lg-host">host</i></span>
      <span><i class="lg-path">path</i></span>
    </div>

    <div class="verdict-row">
      <h2 class="verdict" id="verdict"></h2>
      <div class="score"><b id="scoreNum">0</b> / 100 risk points</div>
    </div>
    <div class="ledger" id="ledger"></div>
    <div class="ledger-scale"><span>0</span><span>safe ≤20</span><span>suspicious ≤45</span><span>100</span></div>

    <div class="signals">
      <span class="eyebrow" id="signalsLabel">Signals</span>
      <div id="signals"></div>
    </div>
  </section>

  <section class="history">
    <span class="eyebrow">Recent scans</span>
    <div id="historyBox"></div>
  </section>

  <footer>
    <span>SEN2241 · Object Oriented Analysis, Design &amp; Implementation</span>
    <a href="/docs">API documentation →</a>
  </footer>

</div>

<script>
const $ = (id) => document.getElementById(id);
const VERDICT_CLASS = { Safe:'v-safe', Suspicious:'v-suspicious', Dangerous:'v-dangerous' };
const VERDICT_VAR  = { Safe:'--safe', Suspicious:'--suspicious', Dangerous:'--danger' };
let totalRules = null;

/* Split the URL for display only. The authoritative parsing lives server-side
   in ParsedUrl; this is purely presentational. */
function dissect(raw) {
  try {
    const withScheme = raw.includes('://') ? raw : 'http://' + raw;
    const u = new URL(withScheme);
    const scheme = raw.includes('://') ? raw.slice(0, raw.indexOf('://') + 3) : '';
    const rest = raw.slice(scheme.length);
    const hostEnd = rest.search(/[/?#]/);
    const hostPart = hostEnd === -1 ? rest : rest.slice(0, hostEnd);
    const pathPart = hostEnd === -1 ? '' : rest.slice(hostEnd);
    return { scheme, host: hostPart, path: pathPart };
  } catch {
    return { scheme:'', host: raw, path:'' };
  }
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function renderSpecimen(raw) {
  const p = dissect(raw);
  $('specimen').innerHTML =
    (p.scheme ? `<span class="seg seg-scheme">${esc(p.scheme)}</span>` : '') +
    `<span class="seg seg-host">${esc(p.host)}</span>` +
    (p.path ? `<span class="seg seg-path">${esc(p.path)}</span>` : '');
}

function renderLedger(flags, verdict) {
  const colour = getComputedStyle(document.documentElement)
                   .getPropertyValue(VERDICT_VAR[verdict]).trim();
  const box = $('ledger');
  box.innerHTML = '';
  flags.forEach(f => {
    const seg = document.createElement('div');
    seg.style.background = colour;
    seg.style.width = '0%';
    seg.title = `${f.name}: +${f.points}`;
    box.appendChild(seg);
    // next frame so the width transition is visible
    requestAnimationFrame(() => { seg.style.width = (f.points || 0) + '%'; });
  });
}

function renderSignals(flags) {
  const box = $('signals');
  $('signalsLabel').textContent =
    totalRules ? `Signals — ${flags.length} of ${totalRules} rules triggered`
               : `Signals — ${flags.length} triggered`;
  if (!flags.length) {
    box.innerHTML = '<div class="clean">No risk signals triggered.</div>';
    return;
  }
  box.innerHTML = flags
    .slice().sort((a,b) => (b.points||0) - (a.points||0))
    .map(f => `<div class="sig">
        <div class="sig-pts">+${f.points || 0}</div>
        <div>
          <div class="sig-name">${esc(f.name)}</div>
          <div class="sig-why">${esc(f.reason)}</div>
        </div>
      </div>`).join('');
}

function renderResult(data) {
  renderSpecimen(data.url);
  const v = $('verdict');
  v.textContent = data.verdict;
  v.className = 'verdict ' + (VERDICT_CLASS[data.verdict] || '');
  $('scoreNum').textContent = data.score;
  renderLedger(data.flags, data.verdict);
  renderSignals(data.flags);
  $('result').hidden = false;
}

function renderHistory(rows) {
  const box = $('historyBox');
  if (!rows.length) {
    box.innerHTML = '<div class="empty">Nothing scanned yet.</div>';
    return;
  }
  box.innerHTML = `<table>
    <thead><tr><th>URL</th><th>Score</th><th>Verdict</th><th>Scanned</th></tr></thead>
    <tbody>${rows.map(r => {
      const cls = VERDICT_CLASS[r.verdict] || '';
      const when = new Date(r.created_at).toLocaleString();
      return `<tr>
        <td class="u">${esc(r.url)}</td>
        <td class="s">${r.score}</td>
        <td class="s ${cls}">${esc(r.verdict)}</td>
        <td class="t">${esc(when)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

async function loadHistory() {
  try {
    const res = await fetch('/scans');
    if (!res.ok) throw new Error();
    renderHistory(await res.json());
  } catch {
    $('historyBox').innerHTML = '<div class="empty">History unavailable.</div>';
  }
}

async function loadRuleCount() {
  try {
    const res = await fetch('/checks');
    const rules = await res.json();
    totalRules = rules.length;
    $('ruleCount').textContent = totalRules;
  } catch {
    $('ruleCount').textContent = '—';
  }
}

async function scan() {
  const url = $('url').value.trim();
  $('msg').textContent = '';
  if (!url) { $('msg').textContent = 'Enter a URL to scan.'; $('url').focus(); return; }

  const btn = $('go');
  btn.disabled = true; btn.textContent = 'Scanning';
  try {
    const res = await fetch('/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!res.ok) throw new Error('Server returned ' + res.status);
    renderResult(await res.json());
    loadHistory();
  } catch (err) {
    $('msg').textContent = 'Could not reach the scanner. Is the server running?';
  } finally {
    btn.disabled = false; btn.textContent = 'Scan';
  }
}

$('go').addEventListener('click', scan);
$('url').addEventListener('keydown', e => { if (e.key === 'Enter') scan(); });
document.querySelectorAll('.sample').forEach(b =>
  b.addEventListener('click', () => { $('url').value = b.dataset.url; scan(); }));

loadRuleCount();
loadHistory();
</script>
</body>
</html>
